<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>查询友链申请状态</title>
<script src="https://cdn.tailwindcss.com"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif; }
  [x-cloak] { display: none !important; }
  .glass {
    background: rgba(255, 255, 255, 0.7);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .gradient-bg {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 50%, #a8edea 100%);
    background-size: 200% 200%;
    animation: gradient 15s ease infinite;
  }
  @keyframes gradient {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .btn-primary {
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    transition: all 0.3s;
  }
  .btn-primary:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px -5px rgba(79, 172, 254, 0.4);
  }
  .input-focus:focus {
    box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.2);
  }
  .status-badge {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: 9999px;
    font-size: 0.875rem;
    font-weight: 600;
  }
  .status-pending { background: #fef3c7; color: #b45309; }
  .status-approved { background: #d1fae5; color: #047857; }
  .status-rejected { background: #fee2e2; color: #b91c1c; }
  .status-not_found { background: #f3f4f6; color: #4b5563; }
</style>
</head>
<body class="gradient-bg min-h-screen py-8 px-4">
<div x-data="app()" x-cloak class="max-w-2xl mx-auto">

  <!-- Header -->
  <div class="text-center mb-8 text-white">
    <h1 class="text-4xl md:text-5xl font-bold mb-2 drop-shadow-lg">查询申请</h1>
    <p class="text-white/80 text-sm md:text-base">输入你的网站标题或链接查询审核结果</p>
  </div>

  <!-- Search Card -->
  <div class="glass rounded-2xl shadow-2xl p-6 md:p-8 mb-6">
    <form @submit.prevent="search">
      <div class="flex flex-col sm:flex-row gap-2">
        <input x-model="query" type="text" required
          class="input-focus flex-1 px-4 py-2.5 border border-gray-200 rounded-lg focus:outline-none focus:border-cyan-400 transition"
          placeholder="输入网站标题或链接">
        <button type="submit" :disabled="loading" class="btn-primary text-white px-6 py-2.5 rounded-lg font-medium whitespace-nowrap">
          <span x-show="!loading">查询</span>
          <span x-show="loading">查询中...</span>
        </button>
      </div>
    </form>
  </div>

  <!-- Result -->
  <div x-show="result" x-transition class="glass rounded-2xl shadow-2xl p-6 md:p-8">
    <div x-show="result.items && result.items.length === 0" class="text-center text-gray-500 py-8">
      <p>😶 没有找到相关记录</p>
      <p class="text-sm mt-2">请确认输入的是网站标题或完整链接</p>
    </div>

    <template x-for="(item, i) in result.items" :key="i">
      <div class="mb-4 last:mb-0" :class="i > 0 ? 'pt-4 border-t border-gray-100' : ''">
        <div class="text-center mb-3">
          <span class="status-badge" :class="'status-' + item.status" x-text="{pending:'⏳ 审核中',approved:'✅ 已通过',rejected:'❌ 已拒绝'}[item.status]"></span>
        </div>
        <div class="space-y-3">
          <div class="flex items-center gap-3 pb-3">
            <img :src="item.record.avatar" @error="$event.target.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 24 24%22 fill=%22%23ccc%22%3E%3Cpath d=%22M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z%22/%3E%3C/svg%3E'"
              class="w-14 h-14 rounded-full object-cover border-2 border-white shadow">
            <div class="flex-1 min-w-0">
              <h3 class="font-bold text-gray-800 truncate" x-text="item.record.title"></h3>
              <a :href="item.record.link" target="_blank" class="text-sm text-cyan-600 hover:underline truncate block" x-text="item.record.link"></a>
            </div>
          </div>
          <div class="text-sm text-gray-600">
            <p class="text-gray-500 mb-1">描述</p>
            <p class="text-gray-800" x-text="item.record.descr"></p>
          </div>
          <div x-show="item.record.rss" class="text-sm text-gray-600">
            <p class="text-gray-500 mb-1">RSS</p>
            <a :href="item.record.rss" target="_blank" class="text-cyan-600 hover:underline break-all" x-text="item.record.rss"></a>
          </div>
          <div class="text-xs text-gray-400 pt-2 border-t border-gray-100">
            <p>提交时间：<span x-text="formatDate(item.record.createdAt)"></span></p>
            <p x-show="item.record.approvedAt">通过时间：<span x-text="formatDate(item.record.approvedAt)"></span></p>
            <p x-show="item.record.rejectedAt">拒绝时间：<span x-text="formatDate(item.record.rejectedAt)"></span></p>
            <p x-show="item.record.rejectReason" class="text-red-500 mt-1">拒绝原因：<span x-text="item.record.rejectReason"></span></p>
          </div>
        </div>
      </div>
    </template>

    <div x-show="result.items && result.items.length > 0" class="text-center text-xs text-gray-400 pt-4 border-t border-gray-100 mt-4">
      共 <span x-text="result.items.length"></span> 条记录
    </div>
  </div>

  <!-- Footer -->
  <div class="text-center text-white/70 text-xs mt-8">
    <a href="/" class="hover:text-white transition">返回申请页</a>
  </div>
</div>

<script>
function app() {
  return {
    query: '',
    loading: false,
    result: null,
    async search() {
      if (!this.query.trim()) return;
      this.loading = true;
      this.result = null;
      try {
        const resp = await fetch('/api/status?q=' + encodeURIComponent(this.query));
        const data = await resp.json();
        this.result = data.data || { items: [] };
      } catch (e) {
        alert('查询失败：' + e.message);
      } finally {
        this.loading = false;
      }
    },
    formatDate(s) {
      if (!s) return '';
      const d = new Date(s);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    }
  };
}
</script>
</body>
</html>
